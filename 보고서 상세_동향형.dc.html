<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <template id="__bundler_thumbnail" data-bg-color="#0b0c0e">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0b0c0e"/>
      <rect x="360" y="240" width="130" height="130" rx="24" fill="#00b894"/>
      <text x="425" y="335" font-family="sans-serif" font-size="80" font-weight="800" fill="#fff" text-anchor="middle">T</text>
      <text x="600" y="480" font-family="sans-serif" font-size="54" font-weight="700" fill="#e8e8ea" text-anchor="middle">동향(국제소식)형</text>
    </svg>
  </template>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family: 'Pretendard'; src: local('Pretendard'); }
    body { margin: 0; background: #0b0c0e; font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif; }
    ::selection { background: #6C5CE7; color: #fff; }
    a { color: #8b7cf6; text-decoration: none; }
    a:hover { color: #a89bff; }
  </style>
</helmet>

<div style="min-height:100vh; background:#0b0c0e; color:#e8e8ea;">
  <div style="max-width:820px; margin:0 auto; padding:56px 40px;">

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <div style="flex:0 0 auto; width:34px; height:34px; border-radius:8px; background:{{ doc.color }}22; border:1px solid {{ doc.color }}55; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:{{ doc.color }}; font-family:'IBM Plex Mono',monospace;">{{ doc.mark }}</div>
      <div style="font-size:14px; color:#c9cad0;">{{ doc.institutionName }}</div>
      <div style="width:3px; height:3px; border-radius:50%; background:#3a3c42;"></div>
      <div style="font-size:13px; color:#5a5d66; font-family:'IBM Plex Mono',monospace;">{{ doc.date }}</div>
    </div>

    <h1 style="font-size:26px; font-weight:700; line-height:1.4; margin:0 0 18px; color:#f2f2f3;">{{ doc.title }}</h1>

    <div style="display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:28px; padding-bottom:28px; border-bottom:1px solid #1e1f24;">
      <div style="font-size:11px; padding:4px 9px; border-radius:6px; background:#17181c; border:1px solid #2a2c31; color:#8a8d96; font-family:'IBM Plex Mono',monospace;">{{ doc.abstractSourceLabel }}</div>
      <div style="flex:1;"></div>
      <a href="{{ doc.sourceUrl }}" target="_blank" rel="noopener" style="font-size:13px; padding:8px 16px; border-radius:8px; background:#6C5CE7; color:#fff; font-weight:600;" style-hover="background:#7d6ef0;">원문 보기 ↗</a>
    </div>

    <div style="border-left:3px solid {{ doc.color }}; padding:4px 0 4px 20px;">
      <div style="display:inline-block; font-size:12px; padding:4px 10px; border-radius:6px; background:{{ doc.color }}1a; color:{{ doc.color }}; font-weight:600; margin-bottom:12px;">{{ doc.region }}</div>
      <div style="font-size:15px; line-height:1.85; color:#d5d6da;">{{ doc.summary }}</div>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const ABSTRACT_SOURCE_LABEL = {
  page_summary: '게시 내용 요약',
};

const DOC = {
  mark: 'KEDI',
  color: '#00b894',
  institutionName: '교육정책네트워크 정보센터 국제기구 교육동향',
  date: '2026-03-04',
  title: 'OECD, 학교 현장의 AI 활용 실태 조사 결과 발표',
  region: 'OECD (국제기구)',
  sourceUrl: 'https://edpolicy.kedi.re.kr/edpolicy/board/31',
  abstractSource: 'page_summary',
  summary: '해당 기관은 최근 해외 주요국의 AI 교육정책 추진 현황을 정리해 소개했다. 각국은 교사 연수 확대와 교육과정 개편을 병행하고 있으며, 국내 정책 설계에 참고할 수 있는 시사점을 담고 있다.',
};

class Component extends DCLogic {
  renderVals() {
    return { doc: { ...DOC, abstractSourceLabel: ABSTRACT_SOURCE_LABEL[DOC.abstractSource] } };
  }
}

</script>
</body>
</html>
